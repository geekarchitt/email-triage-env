name: email-triage-env
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent triages emails by categorizing,
  prioritizing, analyzing senders, and drafting replies.
tasks:
  - name: categorize
    difficulty: easy
    description: Classify the email as urgent, normal, or spam.
  - name: prioritize
    difficulty: medium
    description: Classify the email and assign a priority from 1 to 5.
  - name: full_triage
    difficulty: hard
    description: Classify, prioritize, and decide the correct action.
  - name: sender_analysis
    difficulty: medium
    description: Classify the email and identify if sender is internal or external.
  - name: reply_drafting
    difficulty: hard
    description: Classify, prioritize, and draft an appropriate reply subject line.
observation_space:
  email_id: string
  subject: string
  body: string
  sender: string
  task: string
action_space:
  category: "urgent | normal | spam"
  priority: "integer 1-5"
  action: "reply | archive | delete | escalate"
  sender_type: "internal | external | unknown"
  reply_subject: "string"
reward_range: [0.15, 0.85]
api:
  reset: POST /reset
  step: POST /step
  state: GET /state
  episode_summary: GET /episode_summary